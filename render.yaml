services:
  - type: web
    name: f1-model-radar
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: F1_RADAR_ADMIN_TOKEN
        sync: false
      - key: F1_RADAR_COOKIE_SECURE
        value: "1"
      - key: F1_RADAR_AUTO_FETCH_INTERVAL_MINUTES
        value: "360"
      - key: F1_RADAR_DB_PATH
        value: /var/data/radar.sqlite3
    disk:
      name: f1-model-radar-data
      mountPath: /var/data
      sizeGB: 1
